name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A1D0BD: ${{ secrets.A1D0BD }}
          BA4E70: ${{ secrets.BA4E70 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A1D0BD', '')
          bm = os.environ.get('BA4E70', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- bdbb39f7e529a576eea10e07eebda54f18f0a1b7fe04 -->', gm)
              s2 = s2.replace('<!-- 8280ca2a43f5354da8d435a270dc -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
